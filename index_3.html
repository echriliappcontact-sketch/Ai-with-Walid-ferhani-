<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai with Walid ferhani - Gemini Prompt Engine</title>
    <style>
        :root {
            --bg-color: #08090b;
            --container-bg: #11141a;
            --accent-blue: #00e5ff;
            --accent-purple: #a855f7;
            --text-primary: #f0f0f0;
            --text-secondary: #9ca3af;
            --border-color: #262c38;
            --success-green: #2ecc71;
            --font-family: 'Segoe UI', Roboto, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Navigation */
        header {
            background-color: rgba(8, 9, 11, 0.95);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* Hero Section */
        .hero {
            margin-top: 80px;
            padding: 100px 5% 50px;
            text-align: center;
            background: radial-gradient(circle at center, #161a22 0%, var(--bg-color) 85%);
        }

        .hero h1 { font-size: 3rem; margin-bottom: 1rem; font-weight: 900; }
        .hero h1 span { color: var(--accent-blue); }
        .hero p { color: var(--text-secondary); max-width: 750px; margin: 0 auto; font-size: 1.2rem; }

        /* Search & Filter Controls */
        .controls {
            padding: 25px 5%;
            background: var(--container-bg);
            position: sticky;
            top: 75px;
            z-index: 900;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-box { width: 100%; max-width: 600px; margin: 0 auto 25px; }
        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: #08090b;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0,229,255,0.2); }

        .filters { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .filter-btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: #1a1e26;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border-color: transparent;
            transform: scale(1.05);
        }

        /* Grid Layout */
        .prompt-grid {
            padding: 50px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--container-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent-purple); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .card-img {
            width: 100%;
            height: 220px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--border-color);
        }

        .card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1.25rem; margin-bottom: 15px; font-weight: 800; color: #fff; }
        
        .prompt-text {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            border: 1px solid #222;
            flex-grow: 1;
            font-family: 'Courier New', Courier, monospace;
        }

        .user-tag { color: var(--accent-purple); font-weight: bold; text-decoration: underline; }

        .copy-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #1a1e26, #262c38);
            color: white;
            cursor: pointer;
            font-weight: 800;
            font-size: 1rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .copy-btn:hover { background: var(--accent-blue); color: #000; }
        .copy-btn.copied { background: var(--success-green) !important; color: white; }

        footer { text-align: center; padding: 60px; color: var(--text-secondary); border-top: 1px solid var(--border-color); background: #08090b; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .prompt-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Ai with Walid ferhani</div>
</header>

<section class="hero">
    <h1>حوّل <span>صورتك</span> إلى لوحة فنية</h1>
    <p>مكتبة تضم أكثر من 100 برومت احترافي لـ Gemini. جميع البرومتات تبدأ بـ "Use this picture" لضمان أفضل دمج لصورك الشخصية.</p>
</section>

<div class="controls">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث عن برومت (رونالدو، ميسي، سيارة، فضاء)...">
    </div>
    <div class="filters">
        <button class="filter-btn active" onclick="filterData('الكل')">الكل</button>
        <button class="filter-btn" onclick="filterData('مشاهير')">مشاهير</button>
        <button class="filter-btn" onclick="filterData('سيارات')">سيارات</button>
        <button class="filter-btn" onclick="filterData('سينما')">سينما</button>
        <button class="filter-btn" onclick="filterData('فانتازيا')">فانتازيا</button>
    </div>
</div>

<main class="prompt-grid" id="promptGrid"></main>

<footer>
    <p>&copy; 2026 Ai with Walid ferhani | مصمم لمبدعي الذكاء الاصطناعي</p>
</footer>

<script>
    // قاعدة البيانات المحدثة بعبارة "Use this picture"
    const promptsData = [
        { title: "احتفال مع كريستيانو", category: "مشاهير", img: "https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=500", prompt: "Use this picture, a realistic photo of [USER] standing next to Cristiano Ronaldo on a football pitch, both smiling and holding a trophy, stadium lights, 8k." },
        { title: "اجتماع مع إيلون ماسك", category: "مشاهير", img: "https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=500", prompt: "Use this picture, a cinematic shot of [USER] in a formal suit chatting with Elon Musk inside a high-tech SpaceX office, blurred rocket background." },
        { title: "قيادة لامبورغيني ليلية", category: "سيارات", img: "https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=500", prompt: "Use this picture, a cinematic action shot of [USER] driving a gold Lamborghini Aventador through Dubai at night, neon reflections, motion blur." },
        { title: "بطل أفلام الأكشن", category: "سينما", img: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", prompt: "Use this picture, a high-octane explosion scene with [USER] walking away slowly, fire in the background, cinematic masterpiece, 8k." },
        { title: "فارس فوق التنين", category: "فانتازيا", img: "https://images.unsplash.com/photo-1514539079130-25950c84af65?w=500", prompt: "Use this picture, an epic fantasy photo of [USER] as a knight in glowing armor, standing on a dragon's back flying over mountains." },
        { title: "لقاء ميسي التاريخي", category: "مشاهير", img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500", prompt: "Use this picture, a professional photograph of [USER] shaking hands with Lionel Messi in the locker room, both wearing kits, realistic." },
        { title: "فيراري كلاسيكية حمراء", category: "سيارات", img: "https://images.unsplash.com/photo-1592198084033-aade902d1aae?w=500", prompt: "Use this picture, a car magazine style photo of [USER] leaning against a classic red Ferrari in the Italian countryside, sunset." },
        { title: "رائد فضاء في المريخ", category: "سينما", img: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=500", prompt: "Use this picture, a space movie still with [USER] in a detailed astronaut suit, walking on Mars, Earth in background." }
    ];

    // توليد بقية الـ 100 برومت تلقائياً للتوضيح
    for(let i=9; i<=100; i++) {
        let cat = ["سيارات", "سينما", "مشاهير", "فانتازيا"][Math.floor(Math.random()*4)];
        promptsData.push({
            title: `فكرة إبداعية رقم ${i}`,
            category: cat,
            img: `https://picsum.photos/500/350?random=${i}`,
            prompt: `Use this picture, high-end professional prompt #${i} for [USER] identity mapping, ultra-realistic textures, 85mm lens, golden hour.`
        });
    }

    const grid = document.getElementById('promptGrid');
    const searchInput = document.getElementById('searchInput');

    function displayCards(data) {
        grid.innerHTML = '';
        data.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img" style="background-image: url('${item.img}')"></div>
                <div class="card-body">
                    <div class="card-title">${item.title}</div>
                    <div class="prompt-text">${item.prompt.replace('[USER]', '<span class="user-tag">الصورة الشخصية</span>')}</div>
                    <button class="copy-btn" onclick="copyPrompt('${item.prompt}', this)">نسخ البرومت</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // وظيفة النسخ المطورة (تعمل في كل الحالات)
    function copyPrompt(text, btn) {
        // الطريقة الأولى: المودرن
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => {
                showSuccess(btn);
            });
        } else {
            // الطريقة الثانية: الخطة البديلة (للملفات المحلية)
            let textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showSuccess(btn);
            } catch (err) {
                alert('عذراً، تعذر النسخ التلقائي. يرجى نسخ النص يدوياً.');
            }
            document.body.removeChild(textArea);
        }
    }

    function showSuccess(btn) {
        const originalText = btn.innerText;
        btn.innerText = 'تم النسخ بنجاح!';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.remove('copied');
        }, 2000);
    }

    function filterData(cat) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        const filtered = (cat === 'الكل') ? promptsData : promptsData.filter(i => i.category === cat);
        displayCards(filtered);
    }

    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = promptsData.filter(item => 
            item.title.toLowerCase().includes(term) || 
            item.prompt.toLowerCase().includes(term)
        );
        displayCards(filtered);
    });

    displayCards(promptsData);
</script>

</body>
</html>
